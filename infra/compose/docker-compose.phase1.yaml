include:
  - docker-compose.infra.yaml

services:
  # Add registry schema init to postgres
  postgres:
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./init-registry-schema.sh:/docker-entrypoint-initdb.d/02-init-registry-schema.sh:ro

  registry:
    build:
      context: ../../urule-registry
      dockerfile: Dockerfile
    ports:
      - '${URULE_REGISTRY_PORT:-3001}:3000'
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      DATABASE_URL: postgres://urule:urule@postgres:5432/registry
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://localhost:3000/healthz').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  langgraph-adapter:
    build:
      context: ../../urule-langgraph-adapter
      dockerfile: Dockerfile
    ports:
      - '${URULE_ADAPTER_PORT:-3002}:3000'
    environment:
      PORT: '3000'
      NATS_URL: nats://nats:4222
      REGISTRY_URL: http://registry:3000
      LANGGRAPH_SERVER_URL: http://localhost:8123
    depends_on:
      registry:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://localhost:3000/healthz').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  runtime-broker:
    build:
      context: ../../urule-runtime-broker
      dockerfile: Dockerfile
    ports:
      - '${URULE_BROKER_PORT:-4500}:4500'
    environment:
      PORT: '4500'
      NATS_URL: nats://nats:4222
      REGISTRY_URL: http://registry:3000
    depends_on:
      registry:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://localhost:4500/healthz').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  e2e-tests:
    build:
      context: ../e2e
      dockerfile: Dockerfile
    environment:
      REGISTRY_URL: http://registry:3000
      ADAPTER_URL: http://langgraph-adapter:3000
      BROKER_URL: http://runtime-broker:4500
    depends_on:
      registry:
        condition: service_healthy
      langgraph-adapter:
        condition: service_healthy
      runtime-broker:
        condition: service_healthy
    profiles:
      - test
